# Secret and ConfigMap for database-namespace (used by MongoDB)
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: database-namespace
type: Opaque
data:
  # base64 encoded: username
  mongo-root-username: dXNlcm5hbWU=
  # base64 encoded: password
  mongo-root-password: cGFzc3dvcmQ=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-configmap
  namespace: database-namespace
data:
  # Full service URL with namespace for cross-namespace communication
  database_url: mongodb-service.database-namespace.svc.cluster.local
# Secret and ConfigMap for app-namespace (used by Mongo-Express)
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: app-namespace
type: Opaque
data:
  # base64 encoded: username
  mongo-root-username: dXNlcm5hbWU=
  # base64 encoded: password
  mongo-root-password: cGFzc3dvcmQ=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-configmap
  namespace: app-namespace
data:
  # Full service URL for cross-namespace communication
  database_url: mongodb-service.database-namespace.svc.cluster.local

---
# TLS Secret for Ingress
apiVersion: v1
kind: Secret
metadata:
  name: mongo-tls-secret
  namespace: app-namespace
type: kubernetes.io/tls
data:
  # base64 encoded certificate (replace with your own for production)
  tls.crt: 
  # base64 encoded key (replace with your own for production)
  tls.key: 